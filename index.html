<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frozen Planet Survival</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: #0a0a1a;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
      }

      canvas {
        display: block;
      }

      #hud {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        pointer-events: none;
      }

      #hud div {
        margin-bottom: 8px;
        font-size: 18px;
        text-shadow: 0 0 8px rgba(0, 150, 255, 0.6);
      }

      #instructions {
        position: absolute;
        bottom: 30px;
        width: 100%;
        text-align: center;
        z-index: 10;
        pointer-events: none;
        font-size: 14px;
        opacity: 0.7;
        text-shadow: 0 0 6px rgba(0, 150, 255, 0.4);
      }

      #title {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 20;
        transition: opacity 1s ease;
      }

      #title h1 {
        font-size: 48px;
        text-shadow: 0 0 20px rgba(100, 180, 255, 0.8);
        margin-bottom: 16px;
      }

      #title p {
        font-size: 18px;
        opacity: 0.7;
      }

      #title.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="title">
      <h1>Frozen Planet Survival</h1>
      <p>Press any key or click to begin</p>
    </div>

    <div id="hud" style="display: none">
      <div>Health: <span id="health">100</span></div>
      <div>Score: <span id="score">0</span></div>
      <div>Temperature: <span id="temp">-30</span>&deg;C</div>
    </div>

    <div id="instructions" style="display: none">
      WASD - Move &nbsp;|&nbsp; Mouse - Look &nbsp;|&nbsp; Space - Jump
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from 'three';

      // ── Game State ──────────────────────────────────────
      const state = {
        started: false,
        health: 100,
        score: 0,
        temperature: -30,
        keys: {},
        mouse: { x: 0, y: 0 },
        velocity: new THREE.Vector3(),
        onGround: true,
      };

      // ── Scene Setup ─────────────────────────────────────
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a1a);
      scene.fog = new THREE.FogExp2(0x0a0a2e, 0.015);

      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        500
      );
      camera.position.set(0, 2, 5);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      // ── Lighting ────────────────────────────────────────
      const ambientLight = new THREE.AmbientLight(0x4466aa, 0.4);
      scene.add(ambientLight);

      const moonLight = new THREE.DirectionalLight(0x8899cc, 0.8);
      moonLight.position.set(20, 40, -20);
      moonLight.castShadow = true;
      moonLight.shadow.mapSize.width = 2048;
      moonLight.shadow.mapSize.height = 2048;
      moonLight.shadow.camera.far = 100;
      moonLight.shadow.camera.left = -30;
      moonLight.shadow.camera.right = 30;
      moonLight.shadow.camera.top = 30;
      moonLight.shadow.camera.bottom = -30;
      scene.add(moonLight);

      const hemiLight = new THREE.HemisphereLight(0x4488cc, 0x223344, 0.3);
      scene.add(hemiLight);

      // ── Ground (Frozen Terrain) ─────────────────────────
      const groundGeo = new THREE.PlaneGeometry(200, 200, 100, 100);
      const posAttr = groundGeo.attributes.position;
      for (let i = 0; i < posAttr.count; i++) {
        const x = posAttr.getX(i);
        const y = posAttr.getY(i);
        const height =
          Math.sin(x * 0.05) * 1.5 +
          Math.cos(y * 0.08) * 1.0 +
          Math.sin(x * 0.15 + y * 0.1) * 0.5;
        posAttr.setZ(i, height);
      }
      groundGeo.computeVertexNormals();

      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x667799,
        roughness: 0.3,
        metalness: 0.1,
        flatShading: true,
      });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      // ── Ice Crystals ────────────────────────────────────
      const crystalGeo = new THREE.OctahedronGeometry(1, 0);
      const crystalMat = new THREE.MeshPhysicalMaterial({
        color: 0x88ccff,
        roughness: 0.05,
        metalness: 0.1,
        transmission: 0.6,
        thickness: 0.5,
        clearcoat: 1.0,
      });

      const crystals = [];
      for (let i = 0; i < 40; i++) {
        const crystal = new THREE.Mesh(crystalGeo, crystalMat);
        const scale = 0.3 + Math.random() * 1.2;
        crystal.scale.set(scale * 0.5, scale, scale * 0.5);
        crystal.position.set(
          (Math.random() - 0.5) * 80,
          scale * 0.5,
          (Math.random() - 0.5) * 80
        );
        crystal.rotation.y = Math.random() * Math.PI;
        crystal.castShadow = true;
        crystal.receiveShadow = true;
        crystal.userData = {
          baseY: crystal.position.y,
          phase: Math.random() * Math.PI * 2,
          speed: 0.5 + Math.random() * 0.5,
        };
        scene.add(crystal);
        crystals.push(crystal);
      }

      // ── Snow Particles ──────────────────────────────────
      const snowCount = 5000;
      const snowGeo = new THREE.BufferGeometry();
      const snowPos = new Float32Array(snowCount * 3);
      const snowVel = new Float32Array(snowCount);

      for (let i = 0; i < snowCount; i++) {
        snowPos[i * 3] = (Math.random() - 0.5) * 100;
        snowPos[i * 3 + 1] = Math.random() * 50;
        snowPos[i * 3 + 2] = (Math.random() - 0.5) * 100;
        snowVel[i] = 0.5 + Math.random() * 1.5;
      }
      snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));

      const snowMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.15,
        transparent: true,
        opacity: 0.8,
        depthWrite: false,
      });
      const snow = new THREE.Points(snowGeo, snowMat);
      scene.add(snow);

      // ── Player (Simple Capsule) ─────────────────────────
      const playerGroup = new THREE.Group();

      const bodyGeo = new THREE.CapsuleGeometry(0.3, 0.8, 8, 16);
      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0xcc4444,
        roughness: 0.6,
      });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.7;
      body.castShadow = true;
      playerGroup.add(body);

      // Visor
      const visorGeo = new THREE.SphereGeometry(0.2, 16, 8, 0, Math.PI);
      const visorMat = new THREE.MeshPhysicalMaterial({
        color: 0x44aaff,
        roughness: 0.05,
        metalness: 0.8,
      });
      const visor = new THREE.Mesh(visorGeo, visorMat);
      visor.position.set(0, 1.05, 0.15);
      visor.rotation.x = -Math.PI / 4;
      playerGroup.add(visor);

      playerGroup.position.set(0, 0, 0);
      scene.add(playerGroup);

      // ── Stars ───────────────────────────────────────────
      const starCount = 2000;
      const starGeo = new THREE.BufferGeometry();
      const starPos = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(Math.random() * 0.5 + 0.5);
        const r = 200;
        starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        starPos[i * 3 + 1] = r * Math.cos(phi);
        starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
      const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.3,
        transparent: true,
        opacity: 0.9,
      });
      const stars = new THREE.Points(starGeo, starMat);
      scene.add(stars);

      // ── Aurora Borealis (simple ribbon) ─────────────────
      const auroraCurve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(-60, 50, -80),
        new THREE.Vector3(-20, 55, -70),
        new THREE.Vector3(20, 48, -75),
        new THREE.Vector3(60, 52, -80),
      ]);
      const auroraGeo = new THREE.TubeGeometry(auroraCurve, 64, 3, 8, false);
      const auroraMat = new THREE.MeshBasicMaterial({
        color: 0x44ff88,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide,
      });
      const aurora = new THREE.Mesh(auroraGeo, auroraMat);
      scene.add(aurora);

      // ── Input ───────────────────────────────────────────
      window.addEventListener('keydown', (e) => {
        state.keys[e.key.toLowerCase()] = true;
        if (!state.started) startGame();
      });
      window.addEventListener('keyup', (e) => {
        state.keys[e.key.toLowerCase()] = false;
      });
      window.addEventListener('click', () => {
        if (!state.started) startGame();
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ── Start Game ──────────────────────────────────────
      function startGame() {
        state.started = true;
        document.getElementById('title').classList.add('hidden');
        document.getElementById('hud').style.display = 'block';
        document.getElementById('instructions').style.display = 'block';
      }

      // ── Game Loop ───────────────────────────────────────
      const clock = new THREE.Clock();
      let elapsed = 0;

      function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.1);
        elapsed += dt;

        // Snow animation
        const positions = snow.geometry.attributes.position;
        for (let i = 0; i < snowCount; i++) {
          let y = positions.getY(i);
          y -= snowVel[i] * dt;
          if (y < 0) {
            y = 50;
            positions.setX(i, (Math.random() - 0.5) * 100);
            positions.setZ(i, (Math.random() - 0.5) * 100);
          }
          positions.setY(i, y);
          // Gentle sway
          const x = positions.getX(i);
          positions.setX(i, x + Math.sin(elapsed + i) * 0.002);
        }
        positions.needsUpdate = true;

        // Crystal hover animation
        for (const crystal of crystals) {
          const d = crystal.userData;
          crystal.position.y =
            d.baseY + Math.sin(elapsed * d.speed + d.phase) * 0.2;
          crystal.rotation.y += dt * 0.3;
        }

        // Aurora pulse
        auroraMat.opacity = 0.1 + Math.sin(elapsed * 0.5) * 0.05;

        // Player movement
        if (state.started) {
          const speed = 8;
          const moveDir = new THREE.Vector3();

          if (state.keys['w']) moveDir.z -= 1;
          if (state.keys['s']) moveDir.z += 1;
          if (state.keys['a']) moveDir.x -= 1;
          if (state.keys['d']) moveDir.x += 1;

          if (moveDir.length() > 0) {
            moveDir.normalize();
            playerGroup.position.x += moveDir.x * speed * dt;
            playerGroup.position.z += moveDir.z * speed * dt;

            // Rotate player toward movement direction
            const targetAngle = Math.atan2(moveDir.x, moveDir.z);
            const currentAngle = playerGroup.rotation.y;
            const angleDiff = targetAngle - currentAngle;
            playerGroup.rotation.y += angleDiff * 5 * dt;
          }

          // Simple jump
          if (state.keys[' '] && state.onGround) {
            state.velocity.y = 6;
            state.onGround = false;
          }

          // Gravity
          state.velocity.y -= 15 * dt;
          playerGroup.position.y += state.velocity.y * dt;

          if (playerGroup.position.y <= 0) {
            playerGroup.position.y = 0;
            state.velocity.y = 0;
            state.onGround = true;
          }

          // Player bobbing
          body.position.y = 0.7 + Math.sin(elapsed * 8) * (moveDir.length() > 0 ? 0.05 : 0);

          // Score ticks up over time
          state.score = Math.floor(elapsed * 10);
          document.getElementById('score').textContent = state.score;

          // Temperature fluctuation
          state.temperature = -30 + Math.sin(elapsed * 0.2) * 5;
          document.getElementById('temp').textContent =
            state.temperature.toFixed(0);
        }

        // Camera follows player (third-person)
        const cameraTarget = new THREE.Vector3(
          playerGroup.position.x,
          playerGroup.position.y + 3,
          playerGroup.position.z + 6
        );
        camera.position.lerp(cameraTarget, 3 * dt);
        camera.lookAt(
          playerGroup.position.x,
          playerGroup.position.y + 1,
          playerGroup.position.z
        );

        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
